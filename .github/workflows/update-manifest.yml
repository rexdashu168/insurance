name: Update manifest.json

on:
  push:
    branches: [main]
    paths:
      - 'data/articles/**'
      - 'scripts/build_manifest.py'
      - '.github/workflows/update-manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate manifest.json
        run: python3 scripts/build_manifest.py

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/manifest.json)" ]]; then
            echo "manifest.json is already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json
          git commit -m "chore: auto-update manifest.json"
          for attempt in 1 2 3 4; do
            if git push; then
              exit 0
            fi
            echo "push failed (attempt $attempt), retrying after $((2**attempt))s..."
            sleep $((2**attempt))
            git pull --rebase
          done
          echo "push failed after retries" >&2
          exit 1
